<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVIL - Singularity Visual Intelligence Lab</title>
    <style>
        /* 미니멀 SF 스타일 시트 + 배경 효과 */
        :root { --accent-color: #00d4ff; --bg-color: #0a0a0a; --text-color: #e0e0e0; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Pretendard', sans-serif; margin: 0; line-height: 1.6; overflow-x: hidden; }
        
        /* 배경 Canvas 스타일 */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        /* 메인 컨테이너가 배경 위에 오도록 설정 */
        .container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        #logo-img { height: 50px; width: auto; /* 로고 크기에 맞춰 조절하세요 */ }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: var(--accent-color); cursor: pointer; padding: 8px 15px; border-radius: 4px; transition: all 0.3s ease; }
        .lang-btn:hover { background: var(--accent-color); color: var(--bg-color); }
        
        .hero { padding: 80px 0 120px; text-align: center; }
        .hero h1 { font-size: 3rem; color: var(--accent-color); letter-spacing: -2px; margin: 0; text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        
        .section { margin-bottom: 100px; background: rgba(10, 10, 10, 0.8); padding: 30px; border-radius: 12px; border: 1px solid #222; backdrop-filter: blur(5px); }
        .section h2 { border-bottom: 2px solid #333; padding-bottom: 15px; color: var(--accent-color); margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { border: 1px solid #333; padding: 25px; background: rgba(20, 20, 20, 0.9); border-radius: 8px; transition: transform 0.3s ease, border-color 0.3s ease; }
        .card:hover { border-color: var(--accent-color); transform: translateY(-5px); }
        .card strong { color: var(--accent-color); font-size: 1.2rem; display: block; margin-bottom: 10px; }
        
        footer { border-top: 1px solid #333; padding: 50px 0; font-size: 0.9rem; color: #888; text-align: center; background: rgba(10, 10, 10, 0.9); }
        .contact-info p { margin: 8px 0; }

        @media (max-width: 600px) {
             .hero h1 { font-size: 2rem; }
             .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <header>
            <img src="logo.png" alt="SVIL Logo" id="logo-img" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';">
            <div id="logo-text" style="display:none; font-weight:bold; font-size:24px; color:var(--accent-color);">SVIL</div>
            <button class="lang-btn" onclick="toggleLang()">한국어 / English</button>
        </header>

        <section class="hero">
            <h1 id="slogan"></h1>
        </section>

        <section class="section">
            <h2 id="title-vision"></h2>
            <p id="content-vision" style="white-space: pre-line;"></p>
        </section>

        <section class="section">
            <h2 id="title-research"></h2>
            <div class="grid" id="content-research"></div>
        </section>
    </div>

    <footer class="contact-info">
        <div class="container">
            <h2 id="title-contact" style="color:var(--accent-color);"></h2>
            <p>Email: inblue@yourdomain.com</p>
            <p>Phone: 010-XXXX-XXXX (Office) | Fax: 050-XXXX-XXXX</p>
            <p>Location: 경기도 남양주시 OO동 | Web: www.svil.kr</p>
            <p style="margin-top: 30px; font-size: 0.8rem;">© 2026 Singularity Visual Intelligence Lab. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // --- 콘텐츠 데이터 및 렌더링 로직 ---
        const data = {
            ko: {
                slogan: "한계 없는 확장, 기회의 기술. SVIL",
                vision_title: "연구소 설립 목적",
                vision_content: "SVIL은 AI 시대로 전환되는 중요한 흐름 속에서 시각장애인의 정보 접근 활용 기술을 연구 개발합니다.\n\n우리는 시각장애인과 비장애인이 동등한 위치에서 기회를 가질 수 있는 환경 구축을 제1의 목표로 합니다. 더불어 AI를 활용한 콘텐츠 생산 참여 기술과 새로운 패러다임의 정보화 교육 커리큘럼을 통해, 전 세계 시각장애인의 사회 참여와 삶의 질 향상에 기여하고자 합니다.",
                research_title: "주요 연구 과제 (Phase 1)",
                research: [
                    { t: "순수 연구 (Pure Research)", d: "뇌가소성 기반 비시각적 정보의 시각적 렌더링 메커니즘 연구" },
                    { t: "기술 개발 (Tech Dev)", d: "차세대 음성 인터페이스 및 정보 내비게이션 '보이스 오디세이' 개발" },
                    { t: "교육 커리큘럼 (Education)", d: "시각장애인 관점의 생성형 AI 활용 작곡 및 콘텐츠 창작 프로그램" },
                    { t: "사이드 연구 (Side Project)", d: "AI 기반 실시간 보행 보조 및 환경 정보 제공 웨어러블 시스템" }
                ],
                contact_title: "연락처"
            },
            en: {
                slogan: "Infinite Expansion, Tech of Opportunity. SVIL",
                vision_title: "Our Mission",
                vision_content: "SVIL researches and develops AI-driven information accessibility technologies for the visually impaired in this critical era of transition.\n\nOur primary goal is to build an environment where the visually impaired and non-impaired have equal opportunities. We aim to contribute to the global welfare of the visually impaired through AI-assisted content production technologies and a new paradigm of IT education curricula.",
                research_title: "Key Research Projects (Phase 1)",
                research: [
                    { t: "Pure Research", d: "Mechanisms of visual rendering for non-visual information based on brain plasticity" },
                    { t: "Tech Dev", d: "Development of 'Voice Odyssey', a next-gen voice interface and information navigation system" },
                    { t: "Education Curriculum", d: "Generative AI-based music composition and content creation programs from a visually impaired perspective" },
                    { t: "Side Project", d: "AI-powered wearable systems for real-time walking assistance and environmental awareness" }
                ],
                contact_title: "Contact Us"
            }
        };

        let curLang = 'ko';
        function render() {
            const lang = data[curLang];
            document.getElementById('slogan').innerText = lang.slogan;
            document.getElementById('title-vision').innerText = lang.vision_title;
            document.getElementById('content-vision').innerText = lang.vision_content;
            document.getElementById('title-research').innerText = lang.research_title;
            document.getElementById('title-contact').innerText = lang.contact_title;
            
            const grid = document.getElementById('content-research');
            grid.innerHTML = lang.research.map(r => `<div class="card"><strong>${r.t}</strong><br>${r.d}</div>`).join('');
        }
        function toggleLang() { curLang = curLang === 'ko' ? 'en' : 'ko'; render(); }
        render();

        // --- 배경 뇌파/신경망 애니메이션 (Canvas JS) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 50; // 입자 개수 조절
        const connectionDistance = 150; // 연결선 거리 조절

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5; // 속도 조절
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#00d4ff'; // 입자 색상
                ctx.fill();
            }
        }

        function initParticles() { for (let i = 0; i < particleCount; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectionDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 212, 255, ${1 - dist / connectionDistance})`; // 연결선 색상 및 투명도
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        initParticles();
        animate();
    </script>
</body>
</html>
