<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVIL - Singularity Visual Intelligence Lab</title>
    <style>
        /* 誘몃땲硫 SF ?ㅽ????쒗듃 + 諛곌꼍 ?④낵 */
        :root { --accent-color: #00d4ff; --bg-color: #0a0a0a; --text-color: #e0e0e0; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Pretendard', sans-serif; margin: 0; line-height: 1.6; overflow-x: hidden; }
        
        /* 諛곌꼍 Canvas ?ㅽ???*/
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        /* 硫붿씤 而⑦뀒?대꼫媛 諛곌꼍 ?꾩뿉 ?ㅻ룄濡??ㅼ젙 */
        .container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        #logo-img { height: 50px; width: auto; /* 濡쒓퀬 ?ш린??留욎떠 議곗젅?섏꽭??*/ }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: var(--accent-color); cursor: pointer; padding: 8px 15px; border-radius: 4px; transition: all 0.3s ease; }
        .lang-btn:hover { background: var(--accent-color); color: var(--bg-color); }
        
        .hero { padding: 80px 0 120px; text-align: center; }
        .hero h1 { font-size: 3rem; color: var(--accent-color); letter-spacing: -2px; margin: 0; text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        
        .section { margin-bottom: 100px; background: rgba(10, 10, 10, 0.8); padding: 30px; border-radius: 12px; border: 1px solid #222; backdrop-filter: blur(5px); }
        .section h2 { border-bottom: 2px solid #333; padding-bottom: 15px; color: var(--accent-color); margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { border: 1px solid #333; padding: 25px; background: rgba(20, 20, 20, 0.9); border-radius: 8px; transition: transform 0.3s ease, border-color 0.3s ease; }
        .card:hover { border-color: var(--accent-color); transform: translateY(-5px); }
        .card strong { color: var(--accent-color); font-size: 1.2rem; display: block; margin-bottom: 10px; }
        footer { border-top: 1px solid #333; padding: 50px 0; font-size: 0.9rem; color: #888; text-align: center; background: rgba(10, 10, 10, 0.9); position: relative; z-index: 10; }
        .contact-info p { margin: 8px 0; }
        .footer-menu {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            color: #a6a6a6;
        }
        .footer-menu .divider { color: #555; }
        .footer-menu a,
        .footer-menu button {
            color: var(--accent-color);
            text-decoration: none;
            background: none;
            border: 0;
            padding: 0;
            font: inherit;
            cursor: pointer;
        }
        .footer-menu a:hover,
        .footer-menu button:hover { text-decoration: underline; }
        @media (max-width: 600px) {
             .hero h1 { font-size: 2rem; }
             .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <header>
            <img src="logo.png" alt="SVIL Logo" id="logo-img" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';">
            <div id="logo-text" style="display:none; font-weight:bold; font-size:24px; color:var(--accent-color);">SVIL</div>
            <button class="lang-btn" onclick="toggleLang()">?쒓뎅??/ English</button>
        </header>

        <section class="hero">
            <h1 id="slogan"></h1>
        </section>

        <section class="section">
            <h2 id="title-vision"></h2>
            <p id="content-vision" style="white-space: pre-line;"></p>
        </section>

        <section class="section">
            <h2 id="title-research"></h2>
            <div class="grid" id="content-research"></div>
        </section>
    </div>

    <footer class="contact-info">
        <div class="container">
            <h2 id="title-contact" style="color:var(--accent-color);"></h2>
            <p>Email: inblue@yourdomain.com</p>
            <p>Phone: 010-XXXX-XXXX (Office) | Fax: 050-XXXX-XXXX</p>
            <p>Location: Gyeonggi-do Namyangju-si OO-dong | Web: www.svil.kr</p>
            <nav class="footer-menu" aria-label="Footer menu">
                <a href="privacy.html">&#44060;&#51064;&#51221;&#48372;&#48372;&#54840;</a>
                <span class="divider">|</span>
                <a href="#" id="footer-blog" rel="noopener noreferrer">&#48660;&#47196;&#44536;</a>
                <span class="divider">|</span>
                <a href="#" id="footer-youtube" rel="noopener noreferrer">&#50976;&#53916;&#48652;</a>
                <span class="divider">|</span>
                <button type="button" id="footer-install">&#54856; &#54868;&#47732;&#50640; &#52628;&#44032;</button>
                <span class="divider">|</span>
                <button type="button" id="footer-share">&#44277;&#50976;&#54616;&#44592;</button>
            </nav>
            <p style="margin-top: 30px; font-size: 0.8rem;">&copy; 2026 Singularity Visual Intelligence Lab. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const externalLinks = {
            blog: "",
            youtube: ""
        };
        let deferredInstallPrompt = null;

        window.addEventListener("beforeinstallprompt", (event) => {
            event.preventDefault();
            deferredInstallPrompt = event;
        });
        // --- 肄섑뀗痢??곗씠??諛??뚮뜑留?濡쒖쭅 ---
        const data = {
                        ko: {
                slogan: "무한 확장, 기회의 기술. SVIL",
                vision_title: "연구 및 설립 목적",
                vision_content: "SVIL은 AI 전환 시대에 시각장애인의 정보 접근성을 높이는 기술을 연구하고 개발합니다.\n\n시각장애인과 비장애인이 동등한 기회를 가질 수 있는 환경을 구축하는 것이 우리의 목표입니다. 생성형 AI 기반 콘텐츠 제작 참여 기술과 교육 커리큘럼을 통해 사회 참여와 삶의 질 향상에 기여합니다.",
                research_title: "주요 연구 과제 (Phase 1)",
                research: [
                    { t: "기초 연구 (Pure Research)", d: "비시각 정보의 인지/표현 메커니즘 연구" },
                    { t: "기술 개발 (Tech Dev)", d: "차세대 음성 인터페이스 및 정보 내비게이션 개발" },
                    { t: "교육 커리큘럼 (Education)", d: "생성형 AI 활용 음악 및 콘텐츠 창작 프로그램" },
                    { t: "사이드 프로젝트 (Side Project)", d: "AI 기반 보행 보조 및 환경 인지 웨어러블 연구" }
                ],
                contact_title: "연락처"
            },
            en: {
                slogan: "Infinite Expansion, Tech of Opportunity. SVIL",
                vision_title: "Our Mission",
                vision_content: "SVIL researches and develops AI-driven information accessibility technologies for the visually impaired in this critical era of transition.\n\nOur primary goal is to build an environment where the visually impaired and non-impaired have equal opportunities. We aim to contribute to the global welfare of the visually impaired through AI-assisted content production technologies and a new paradigm of IT education curricula.",
                research_title: "Key Research Projects (Phase 1)",
                research: [
                    { t: "Pure Research", d: "Mechanisms of visual rendering for non-visual information based on brain plasticity" },
                    { t: "Tech Dev", d: "Development of 'Voice Odyssey', a next-gen voice interface and information navigation system" },
                    { t: "Education Curriculum", d: "Generative AI-based music composition and content creation programs from a visually impaired perspective" },
                    { t: "Side Project", d: "AI-powered wearable systems for real-time walking assistance and environmental awareness" }
                ],
                contact_title: "Contact Us"
            }
        };

        let curLang = 'ko';
        function render() {
            const lang = data[curLang];
            document.getElementById('slogan').innerText = lang.slogan;
            document.getElementById('title-vision').innerText = lang.vision_title;
            document.getElementById('content-vision').innerText = lang.vision_content;
            document.getElementById('title-research').innerText = lang.research_title;
            document.getElementById('title-contact').innerText = lang.contact_title;
            
            const grid = document.getElementById('content-research');
            grid.innerHTML = lang.research.map(r => `<div class="card"><strong>${r.t}</strong><br>${r.d}</div>`).join('');
        }
        function toggleLang() { curLang = curLang === 'ko' ? 'en' : 'ko'; render(); }
        render();

        function openExternalLink(key) {
            const targetUrl = externalLinks[key];
            if (!targetUrl) {
                alert("\uD574\uB2F9 \uB9C1\uD06C\uB294 \uC544\uC9C1 \uC900\uBE44 \uC911\uC785\uB2C8\uB2E4. URL\uC744 \uC124\uC815\uD574 \uC8FC\uC138\uC694.");
                return;
            }
            window.open(targetUrl, "_blank", "noopener,noreferrer");
        }

        async function addToHomeScreen() {
            if (deferredInstallPrompt) {
                deferredInstallPrompt.prompt();
                await deferredInstallPrompt.userChoice;
                deferredInstallPrompt = null;
                return;
            }
            alert("\uBE0C\uB77C\uC6B0\uC800 \uBA54\uB274\uC5D0\uC11C '\uD648 \uD654\uBA74\uC5D0 \uCD94\uAC00'\uB97C \uC120\uD0DD\uD574 \uC8FC\uC138\uC694.");
        }

        async function sharePage() {
            const shareData = {
                title: document.title,
                text: "SVIL homepage",
                url: window.location.href
            };
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                    return;
                } catch (error) {
                    if (error && error.name === "AbortError") return;
                }
            }
            try {
                await navigator.clipboard.writeText(shareData.url);
                alert("\uB9C1\uD06C\uB97C \uD074\uB9BD\uBCF4\uB4DC\uC5D0 \uBCF5\uC0AC\uD588\uC2B5\uB2C8\uB2E4.");
            } catch (error) {
                prompt("\uC544\uB798 \uB9C1\uD06C\uB97C \uBCF5\uC0AC\uD574 \uC8FC\uC138\uC694.", shareData.url);
            }
        }

        document.getElementById("footer-blog").addEventListener("click", (event) => {
            event.preventDefault();
            openExternalLink("blog");
        });

        document.getElementById("footer-youtube").addEventListener("click", (event) => {
            event.preventDefault();
            openExternalLink("youtube");
        });

        document.getElementById("footer-install").addEventListener("click", () => {
            addToHomeScreen();
        });

        document.getElementById("footer-share").addEventListener("click", () => {
            sharePage();
        });
        // --- 諛곌꼍 ?뚰뙆/?좉꼍留??좊땲硫붿씠??(Canvas JS) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 50; // ?낆옄 媛쒖닔 議곗젅
        const connectionDistance = 150; // ?곌껐??嫄곕━ 議곗젅

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5; // ?띾룄 議곗젅
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#00d4ff'; // ?낆옄 ?됱긽
                ctx.fill();
            }
        }

        function initParticles() { for (let i = 0; i < particleCount; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectionDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 212, 255, ${1 - dist / connectionDistance})`; // ?곌껐???됱긽 諛??щ챸??
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        initParticles();
        animate();
    </script>
</body>
</html>
